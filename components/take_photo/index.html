<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  .btn {
    display: block;
    width: 100%;
    box-sizing: border-box;
    font: inherit;
    font-weight: 600;
    font-size: 0.95rem;
    line-height: 1.4;
    border-radius: 0.5rem;
    padding: 0.45rem 0.75rem;
    cursor: pointer;
    border: 1px solid #2563eb;
    background: #2563eb;
    color: #fff;
    text-align: center;
  }
  .btn:active { background: #1d4ed8; }
  .mobile-only { display: none; }
  .desktop-only { display: block; }
</style>
</head>
<body>
  <div id="mobile-panel" class="mobile-only">
    <input type="file" id="native-input" accept="image/*" capture="environment" hidden />
    <label for="native-input" class="btn">Take an image</label>
  </div>
  <div id="desktop-panel" class="desktop-only">
    <button type="button" class="btn" id="open-webcam">Take an image</button>
  </div>

<script>
  function _send(type, data) {
    window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type: type }, data), "*");
  }
  function ready()      { _send("streamlit:componentReady", { apiVersion: 1 }); }
  function setHeight(h) { _send("streamlit:setFrameHeight", { height: h }); }
  function setValue(v)  { _send("streamlit:setComponentValue", { value: v, dataType: "json" }); }

  function isPhoneDevice() {
    var ua = navigator.userAgent || "";
    if (/Android.*Mobile|iPhone|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(ua)) {
      return true;
    }
    if (/iPad/i.test(ua)) return true;
    if (navigator.platform === "MacIntel" && navigator.maxTouchPoints > 1 && window.innerWidth <= 1024) {
      return true;
    }
    return false;
  }

  const mobilePanel  = document.getElementById("mobile-panel");
  const desktopPanel = document.getElementById("desktop-panel");
  const nativeInput  = document.getElementById("native-input");
  const openWebcam   = document.getElementById("open-webcam");
  const useNative    = isPhoneDevice();

  function applyMode() {
    if (useNative) {
      mobilePanel.style.display = "block";
      desktopPanel.style.display = "none";
    } else {
      mobilePanel.style.display = "none";
      desktopPanel.style.display = "block";
    }
  }

  function reportHeight() {
    setHeight(document.body.scrollHeight + 4);
  }

  nativeInput.addEventListener("change", function () {
    const file = nativeInput.files && nativeInput.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function () { setValue(reader.result); };
    reader.readAsDataURL(file);
  });

  openWebcam.addEventListener("click", function () {
    setValue("OPEN_CAMERA");
  });

  window.addEventListener("message", function (event) {
    if (event.data && event.data.type === "streamlit:render") {
      applyMode();
      reportHeight();
    }
  });

  applyMode();
  ready();
  reportHeight();
</script>
</body>
</html>
