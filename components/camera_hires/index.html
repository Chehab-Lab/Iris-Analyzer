<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<style>
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    color: #1f2937;
    background: #e8ecf4;
  }
  .wrap {
    display: flex;
    flex-direction: column;
    gap: 12px;
    padding: 4px 0 8px;
    min-height: 100%;
  }
  .video-shell {
    position: relative;
    width: 100%;
    background: #000;
    border-radius: 12px;
    overflow: hidden;
    border: 1px solid rgba(15, 23, 42, 0.08);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  video {
    display: block;
    width: 100%;
    max-height: min(72vh, 640px);
    object-fit: contain;
    background: #000;
  }
  .row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }
  button {
    font: inherit;
    font-weight: 600;
    border-radius: 10px;
    padding: 0.65rem 1rem;
    cursor: pointer;
    border: 1px solid #2563eb;
    background: #2563eb;
    color: #fff;
    transition: background 0.12s ease;
  }
  button:hover { background: #1d4ed8; }
  button.sec {
    background: #fff;
    color: #1f2937;
    border-color: #d1d5db;
  }
  button.sec:hover { background: #f7f8fa; }
  .hint { font-size: 0.82rem; color: #64748b; flex: 1; min-width: 180px; }

  @media (max-width: 768px), (pointer: coarse) {
    body { background: #000; }
    .wrap {
      gap: 10px;
      padding: 0;
      min-height: calc(100vh - 8px);
    }
    .video-shell {
      flex: 1;
      min-height: calc(100vh - 120px);
      border-radius: 0;
      border: none;
    }
    video {
      width: 100%;
      height: calc(100vh - 120px);
      max-height: none;
    }
    .row {
      padding: 0 10px 10px;
      background: #111827;
    }
    button.sec {
      background: #1f2937;
      color: #f9fafb;
      border-color: #374151;
    }
    .hint { color: #9ca3af; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <div class="video-shell">
      <video id="video" autoplay playsinline muted></video>
    </div>
    <div class="row">
      <button id="capture">Capture photo</button>
      <button id="flip" class="sec" type="button">Flip camera</button>
      <span class="hint" id="hint">Starting camera…</span>
    </div>
  </div>

<script>
  function _send(type, data) {
    window.parent.postMessage(Object.assign({ isStreamlitMessage: true, type: type }, data), "*");
  }
  function ready()      { _send("streamlit:componentReady", { apiVersion: 1 }); }
  function setHeight(h) { _send("streamlit:setFrameHeight", { height: h }); }
  function setValue(v)  { _send("streamlit:setComponentValue", { value: v, dataType: "json" }); }

  const video   = document.getElementById("video");
  const capture = document.getElementById("capture");
  const flip    = document.getElementById("flip");
  const hint    = document.getElementById("hint");

  const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent)
    || (navigator.maxTouchPoints > 1 && window.matchMedia("(pointer: coarse)").matches);

  let stream = null;
  let facingMode = isMobile ? "environment" : "user";
  let starting = false;

  function reportHeight() {
    const h = isMobile
      ? Math.max(window.innerHeight - 64, document.body.scrollHeight + 12)
      : document.body.scrollHeight + 12;
    setHeight(Math.max(h, 480));
  }

  function stopStream() {
    if (!stream) return;
    stream.getTracks().forEach(function (track) { track.stop(); });
    stream = null;
    video.srcObject = null;
  }

  function videoConstraints() {
    const base = {
      facingMode: { ideal: facingMode },
      width:  { ideal: isMobile ? 1920 : 4096 },
      height: { ideal: isMobile ? 1920 : 2160 },
    };
    if (isMobile) {
      base.aspectRatio = { ideal: 1.0 };
    }
    return { audio: false, video: base };
  }

  async function startCamera() {
    if (starting) return;
    starting = true;
    stopStream();
    hint.textContent = "Starting camera…";
    try {
      stream = await navigator.mediaDevices.getUserMedia(videoConstraints());
      video.srcObject = stream;
      await video.play();
      const track = stream.getVideoTracks()[0];
      const s = track.getSettings ? track.getSettings() : {};
      const label = facingMode === "environment" ? "Rear camera" : "Front camera";
      hint.textContent = label + ": " + (s.width || video.videoWidth) + "×" + (s.height || video.videoHeight);
    } catch (e) {
      if (facingMode === "environment") {
        facingMode = "user";
        starting = false;
        return startCamera();
      }
      hint.textContent = "Camera error: " + (e && e.message ? e.message : e)
        + ". Allow camera access, then reload.";
    } finally {
      starting = false;
    }
    reportHeight();
  }

  function captureCropRect(vw, vh) {
    if (!isMobile) {
      return { sx: 0, sy: 0, sw: vw, sh: vh };
    }
    const ratio = vw / vh;
    if (ratio > 1.15) {
      const size = vh;
      return { sx: Math.floor((vw - size) / 2), sy: 0, sw: size, sh: size };
    }
    if (ratio < 0.85) {
      const size = vw;
      return { sx: 0, sy: Math.floor((vh - size) / 2), sw: size, sh: size };
    }
    return { sx: 0, sy: 0, sw: vw, sh: vh };
  }

  flip.addEventListener("click", function () {
    facingMode = facingMode === "environment" ? "user" : "environment";
    startCamera();
  });

  capture.addEventListener("click", function () {
    if (!video.videoWidth) return;
    const vw = video.videoWidth;
    const vh = video.videoHeight;
    const rect = captureCropRect(vw, vh);
    const canvas = document.createElement("canvas");
    canvas.width = rect.sw;
    canvas.height = rect.sh;
    canvas.getContext("2d").drawImage(
      video, rect.sx, rect.sy, rect.sw, rect.sh, 0, 0, rect.sw, rect.sh
    );
    const dataUrl = canvas.toDataURL("image/jpeg", 0.95);
    setValue(dataUrl);
    hint.textContent = "Captured " + canvas.width + "×" + canvas.height + " — capture again to retake";
  });

  window.addEventListener("message", function (event) {
    if (event.data && event.data.type === "streamlit:render") {
      const args = event.data.args || {};
      if (args.default_facing === "user" || args.default_facing === "environment") {
        facingMode = args.default_facing;
      }
      if (!stream && !starting) startCamera();
    }
  });

  video.addEventListener("loadedmetadata", reportHeight);
  window.addEventListener("resize", reportHeight);
  ready();
  reportHeight();
</script>
</body>
</html>
